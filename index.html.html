<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>🍚 샛별초 잔반 검사기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Malgun Gothic', -apple-system, sans-serif;
      background: linear-gradient(160deg, #1e3c72 0%, #2a5298 45%, #6dd5ed 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 520px;
      margin: 0 auto;
      background: white;
      padding: 0 0 30px 0;
      border-radius: 24px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    /* ── 교표 헤더 ── */
    .school-header {
      background: linear-gradient(135deg, #f8fbff 0%, #e8f1fb 100%);
      border-bottom: 3px solid #1e3c72;
      padding: 22px 30px 18px 30px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .school-header img {
      width: 72px;
      height: auto;
      flex: 0 0 auto;
    }
    .school-header .title-block h1 {
      color: #1e3c72;
      font-size: 26px;
      line-height: 1.2;
    }
    .school-header .title-block p {
      color: #4a6fa5;
      font-size: 14px;
      margin-top: 4px;
      font-weight: bold;
    }
    .inner { padding: 24px 30px 0 30px; }
    .step { margin: 18px 0; }
    label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
      color: #2d3436;
      font-size: 17px;
    }
    .selector-row { display: flex; gap: 10px; align-items: center; }
    .fixed-grade {
      flex: 0 0 auto;
      padding: 15px 20px;
      background: #e8f1fb;
      border: 2px solid #1e3c72;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      color: #1e3c72;
    }
    select, button {
      padding: 15px;
      font-size: 18px;
      border-radius: 12px;
      border: 2px solid #dfe6e9;
      font-family: inherit;
    }
    select { flex: 1; background: white; }
    select:disabled { background: #f5f5f5; color: #aaa; }
    button {
      width: 100%;
      background: #1e3c72;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    button:hover:not(:disabled) { background: #16305e; transform: translateY(-2px); }
    button:disabled { background: #b2bec3; cursor: not-allowed; }
    #captureBtn { background: #00b894; }
    #captureBtn:hover:not(:disabled) { background: #00a382; }
    #video-wrap {
      margin: 18px 0;
      text-align: center;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      display: none;
      position: relative;
    }
    #video {
      width: 100%;
      max-height: 380px;
      object-fit: cover;
      display: block;
      transform: scaleX(1); /* 후면 카메라: 반전 없음 */
    }
    #video.mirrored { transform: scaleX(-1); } /* 전면 카메라일 때 거울 반전 */
    #confirm {
      padding: 14px;
      background: #e8f1fb;
      border-radius: 12px;
      text-align: center;
      font-size: 19px;
      font-weight: bold;
      color: #1e3c72;
      margin: 14px 0;
      display: none;
    }
    #result {
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      margin: 18px 0;
      display: none;
      font-size: 20px;
      font-weight: bold;
      line-height: 1.5;
    }
    #result.good { background: #d1f2eb; color: #0e6655; border: 3px solid #00b894; }
    #result.medium { background: #fef9e7; color: #7d6608; border: 3px solid #f39c12; }
    #result.bad { background: #fadbd8; color: #922b21; border: 3px solid #e74c3c; }
    #status {
      text-align: center;
      color: #636e72;
      font-size: 15px;
      margin-top: 12px;
      min-height: 25px;
      padding: 0 20px;
      white-space: pre-line;
    }
    #status.error {
      color: #c0392b;
      background: #fdecea;
      border-radius: 10px;
      padding: 14px;
      text-align: left;
      font-size: 14px;
      line-height: 1.6;
    }
    .emoji-big { font-size: 60px; display: block; margin-bottom: 10px; }
    .switch-cam {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: auto;
      padding: 8px 14px;
      font-size: 14px;
      background: rgba(255,255,255,0.85);
      color: #1e3c72;
      border-radius: 20px;
    }
    footer {
      text-align: center;
      color: #90a4c8;
      font-size: 12px;
      margin-top: 20px;
    }
  </style>
</head>

      const confirmDiv = document.getElementById('confirm');
      if (num && cls) {
        confirmDiv.textContent = `✅ 5학년 ${cls}반 ${num}번 선택됨`;
        confirmDiv.style.display = 'block';
      } else {
        confirmDiv.style.display = 'none';
      }
    });

    function getSelectedStudent() {
      const cls = document.getElementById('classSelect').value;
      const num = document.getElementById('numberSelect').value;
      if (!cls || !num) return null;
      return { 학년: 5, 반: parseInt(cls), 번호: parseInt(num) };
    }

    function setStatus(msg, isError) {
      statusEl.textContent = msg;
      statusEl.className = isError ? 'error' : '';
    }

    // ── 카메라 시작 (핵심 수정 부분) ──
    document.getElementById('startBtn').addEventListener('click', startCamera);
    document.getElementById('switchBtn').addEventListener('click', switchCamera);
    document.getElementById('captureBtn').addEventListener('click', capture);

    async function startCamera() {
      const student = getSelectedStudent();
      if (!student) { alert('먼저 반과 번호를 모두 선택하세요'); return; }

      // 1단계: 보안 컨텍스트 확인 (https가 아니면 카메라 자체가 차단됨)
      if (!window.isSecureContext) {
        setStatus(
          "❌ 카메라를 켤 수 없는 환경입니다.\n" +
          "원인: 이 페이지가 https 주소가 아닙니다.\n" +
          "해결: 파일을 더블클릭해서 열지 말고, Netlify에 올린 https 주소로 접속하세요.\n" +
          "(주소창이 https:// 로 시작해야 합니다)", true);
        return;
      }

      // 2단계: 브라우저 지원 확인
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus(
          "❌ 이 브라우저는 카메라 기능을 지원하지 않습니다.\n" +
          "해결: 크롬(Chrome) 최신 버전으로 접속하세요.", true);
        return;
      }

      document.getElementById('startBtn').disabled = true;
      setStatus('카메라 권한을 요청하는 중...\n브라우저에서 "허용"을 눌러주세요');

      // 3단계: 카메라 열기 (후면 우선, 실패 시 아무 카메라나)
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: usingFacing, width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        });
      } catch (err1) {
        try {
          // 후면 카메라가 없는 기기(노트북 등) → 아무 카메라나
          stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
          usingFacing = "user";
        } catch (err2) {
          handleCameraError(err2);
          document.getElementById('startBtn').disabled = false;
          return;
        }
      }

      // 4단계: 비디오에 스트림 연결
      video.srcObject = stream;
      video.classList.toggle('mirrored', usingFacing === 'user');
      document.getElementById('video-wrap').style.display = 'block';
      await video.play();

      // 5단계: AI 모델 로딩 (카메라와 분리해서 원인 구분 가능)
      setStatus('카메라 연결 완료! AI 모델을 불러오는 중... (약 10초)');
      try {
        model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
      } catch (e) {
        setStatus(
          "❌ 카메라는 켜졌지만 AI 모델을 불러오지 못했습니다.\n" +
          "원인: 코드의 MODEL_URL이 잘못되었을 가능성이 높습니다.\n" +
          "해결: ① 티처블머신에서 '모델 내보내기 → 업로드'로 만든 URL인지\n" +
          "② URL 끝에 / 가 있는지 확인하세요.\n" +
          "상세: " + e.message, true);
        document.getElementById('startBtn').disabled = false;
        return;
      }

      document.getElementById('captureStep').style.display = 'block';
      document.getElementById('startBtn').style.display = 'none';
      setStatus('준비 완료! 식판을 카메라 앞에 대세요');
    }

    function handleCameraError(err) {
      let guide;
      switch (err.name) {
        case 'NotAllowedError':
        case 'PermissionDeniedError':
          guide = "❌ 카메라 권한이 거부되었습니다.\n" +
                  "해결: 주소창 왼쪽의 자물쇠(🔒) 아이콘 클릭 → 카메라 → '허용'으로 변경 → 새로고침";
          break;
        case 'NotFoundError':
        case 'DevicesNotFoundError':
          guide = "❌ 이 기기에서 카메라를 찾을 수 없습니다.\n" +
                  "해결: 카메라가 달린 태블릿·노트북에서 접속하세요.";
          break;
        case 'NotReadableError':
        case 'TrackStartError':
          guide = "❌ 다른 앱이 카메라를 사용 중입니다.\n" +
                  "해결: 줌·카메라앱 등 카메라를 쓰는 다른 앱을 모두 끄고 새로고침하세요.";
          break;
        default:
          guide = "❌ 카메라 오류: " + err.name + "\n" + err.message;
      }
      setStatus(guide, true);
    }

    async function switchCamera() {
      if (!stream) return;
      stream.getTracks().forEach(t => t.stop());
      usingFacing = (usingFacing === "environment") ? "user" : "environment";
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: usingFacing }, audio: false
        });
        video.srcObject = stream;
        video.classList.toggle('mirrored', usingFacing === 'user');
        await video.play();
      } catch (e) {
        setStatus("카메라 전환 실패: 이 기기에 카메라가 1개뿐일 수 있습니다", true);
      }
    }

    // ── 촬영 및 판별 ──
    async function capture() {
      if (isProcessing || !model) return;
      isProcessing = true;
      document.getElementById('captureBtn').disabled = true;
      setStatus('AI가 판별하는 중...');

      try {
        const prediction = await model.predict(video);

        const none = prediction.find(p => p.className.includes('없음'))?.probability || 0;
        const some = prediction.find(p => p.className.includes('조금'))?.probability || 0;
        const many = prediction.find(p => p.className.includes('많이'))?.probability || 0;

        const score = Math.round(some * 5 + many * 10);

        const result = document.getElementById('result');
        let msg, cls;
        if (score <= 2) {
          msg = `<span class="emoji-big">🎉</span>잔반 점수 ${score}점<br>정말 잘 먹었어요!`;
          cls = 'good';
        } else if (score <= 6) {
          msg = `<span class="emoji-big">😊</span>잔반 점수 ${score}점<br>잘 먹었어요! 다음엔 한 입만 더 도전해볼까요?`;
          cls = 'medium';
        } else {
          msg = `<span class="emoji-big">💪</span>잔반 점수 ${score}점<br>다음엔 조금만 더 먹어보면 좋겠어요`;
          cls = 'bad';
        }
        result.innerHTML = msg;
        result.className = cls;
        result.style.display = 'block';

        const student = getSelectedStudent();
        const payload = {
          학년: student.학년,
          반: student.반,
          번호: student.번호,
          점수: score,
          신뢰도_없음: none.toFixed(3),
          신뢰도_조금: some.toFixed(3),
          신뢰도_많이: many.toFixed(3)
        };

        try {
          await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          setStatus('✅ 기록 완료! 곧 다음 친구를 위해 초기화됩니다');
        } catch (e) {
          setStatus('⚠️ 점수는 나왔지만 기록 전송에 실패했습니다: ' + e.message, true);
        }

        setTimeout(resetForNext, 5000);

      } catch (e) {
        setStatus('❌ 판별 오류: ' + e.message, true);
        document.getElementById('captureBtn').disabled = false;
        isProcessing = false;
      }
    }

    function resetForNext() {
      document.getElementById('classSelect').value = '';
      document.getElementById('numberSelect').innerHTML = '<option value="">번호</option>';
      document.getElementById('numberSelect').disabled = true;
      document.getElementById('confirm').style.display = 'none';
      document.getElementById('result').style.display = 'none';
      document.getElementById('captureBtn').disabled = false;
      setStatus('다음 친구가 사용할 수 있어요');
      isProcessing = false;
    }
  </script>
</body>
</html>
